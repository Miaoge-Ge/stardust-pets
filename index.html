<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>StardustPets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 260px; height: 300px;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    #stage { position: absolute; inset: 0; }
    #stage canvas { display: block; }

    .hidden { display: none !important; }

    /* 举牌 / 说话气泡 */
    #sign {
      position: absolute;
      left: 50%; top: 18px;
      transform: translateX(-50%);
      max-width: 230px;
      background: #fdf3dc;
      border: 2px solid #8a6437;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #4a3620;
      line-height: 1.5;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 20;
      pointer-events: none;
      white-space: pre-wrap;
      text-align: center;
    }
    #sign::after {
      content: "";
      position: absolute;
      left: 50%; bottom: -7px;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #8a6437;
      border-bottom: none;
    }
    #sign.action {
      pointer-events: auto;
      cursor: pointer;
      border-color: #4a9d5f;
      background: #eaf7e6;
      animation: signPulse 1.2s ease-in-out infinite;
    }
    @keyframes signPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }

    /* 对话输入 */
    #bubble {
      position: absolute;
      left: 50%; top: 6px;
      transform: translateX(-50%);
      width: 236px;
      background: #ffffff;
      border: 2px solid #7f9dc4;
      border-radius: 10px;
      padding: 8px;
      z-index: 30;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    #bubble .reply {
      font-size: 12px; color: #333;
      margin-bottom: 6px; line-height: 1.5;
      min-height: 16px;
      white-space: pre-wrap;
    }
    #bubble input {
      width: 100%;
      border: 1px solid #b8c8dc;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
      outline: none;
    }
    #bubble .hint { font-size: 10px; color: #999; margin-top: 4px; }

    /* 右键菜单 */
    #menu {
      position: absolute;
      z-index: 40;
      min-width: 118px;
      background: #2d2a33;
      border: 1px solid #4c4757;
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      font-size: 12px;
      color: #e8e4f0;
    }
    #menu .item {
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #menu .item:hover { background: #46415a; }
    #menu .item.disabled { color: #6f6a7d; cursor: default; }
    #menu .item.disabled:hover { background: transparent; }
    #menu .sep { height: 1px; background: #4c4757; margin: 3px 6px; }
    #menu .tag { font-size: 10px; color: #8d86a0; }

    #submenu {
      position: absolute;
      z-index: 41;
      width: 110px;
      max-height: 190px;
      overflow-y: auto;
      background: #2d2a33;
      border: 1px solid #4c4757;
      border-radius: 8px;
      padding: 4px;
      font-size: 11px;
      color: #e8e4f0;
    }
    #submenu::-webkit-scrollbar { width: 5px; }
    #submenu::-webkit-scrollbar-thumb { background: #55506a; border-radius: 3px; }
    #submenu .item { padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    #submenu .item:hover { background: #46415a; }

    /* 获得货币飘字 */
    .coin-float {
      position: absolute;
      left: 50%; top: 110px;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: bold;
      color: #ffd66b;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
      pointer-events: none;
      z-index: 50;
      animation: coinUp 1.8s ease-out forwards;
    }
    @keyframes coinUp {
      0% { opacity: 0; transform: translate(-50%, 12px); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -46px); }
    }
    .coin-float.heart { color: #f08a9c; left: 38%; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="sign" class="hidden"></div>
  <div id="bubble" class="hidden">
    <div class="reply"></div>
    <input type="text" maxlength="60" placeholder="和它说点什么…(回车发送,Esc 关闭)" />
    <div class="hint">未配置 LLM 时使用预设台词(右键 → 设置)</div>
  </div>
  <div id="menu" class="hidden"></div>
  <div id="submenu" class="hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
